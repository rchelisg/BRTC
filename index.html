<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta name="theme-color" content="#81C784">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Battery Calculator">
    <link rel="manifest" href="manifest.json">
    <title>Battery Run Time Calculator</title>
    <style>
        /* 全局重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 基础样式 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            height: 100%;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            overscroll-behavior: auto;
            overflow-y: auto;
        }
        
        /* 安全区域处理 */
        @supports (padding: max(0px)) {
            body {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
                padding-bottom: env(safe-area-inset-bottom);
            }
        }
        
        /* 应用容器 */
        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            height: 100%;
        }
        
        /* 标题区 */
        .header {
            background-color: #81C784;
            color: white;
            padding: 12px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
        }
        
        /* 按键区 */
        .button-area {
            display: flex;
            justify-content: space-between;
            padding: 8px 16px;
            background-color: white;
            border-bottom: 1px solid #e0e0e0;
            gap: 16px;
        }
        
        /* 按键 */
        .button {
            flex: 1;
            padding: 4px 8px;
            background-color: transparent;
            border: none;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            cursor: pointer;
        }
        
        /* 按键激活状态 */
        .button.active {
            color: #2196F3;
            border-bottom: 2px solid #2196F3;
        }
        
        /* 子屏幕区域 */
        .subscreen-area {
            flex: 1;
            background-color: white;
            margin: 0;
            border-radius: 0;
            box-shadow: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 500;
            color: #333;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            min-height: 0;
            overscroll-behavior: contain;
        }
        
        /* 子屏幕背景颜色 */
        .subscreen-area.Calc {
            background-color: #FFCDD2;
        }
        
        .subscreen-area.DfX {
            background-color: #BBDEFB;
        }
        
        .subscreen-area.Settings {
            background-color: #FFF3E0;
        }
        
        /* 注脚区 */
        .footer {
            padding: 11px;
            text-align: center;
            font-size: 11px;
            color: #666;
        }
        
        /* 响应式设计 */
        /* 小屏幕设备 */
        @media (max-width: 320px) {
            .header {
                font-size: 12px;
                padding: 9px;
            }
            
            .button {
                font-size: 10px;
                padding: 4px 6px;
            }
            
            .subscreen-area {
                font-size: 16px;
            }
            
            .footer {
                font-size: 9px;
                padding: 8.4px;
            }
        }
        
        /* 中等屏幕设备 */
        @media (min-width: 321px) and (max-width: 375px) {
            .header {
                font-size: 14px;
                padding: 10.5px;
            }
            
            .button {
                font-size: 12px;
                padding: 4px 8px;
            }
            
            .subscreen-area {
                font-size: 18px;
            }
            
            .footer {
                font-size: 10px;
                padding: 9.8px;
            }
        }
        
        /* 大屏幕设备 */
        @media (min-width: 376px) and (max-width: 428px) {
            .header {
                font-size: 16px;
                padding: 12px;
            }
            
            .button {
                font-size: 14px;
                padding: 4px 8px;
            }
            
            .subscreen-area {
                font-size: 20px;
            }
            
            .footer {
                font-size: 11px;
                padding: 11.2px;
            }
        }
        
        /* 平板设备和普通浏览器 */
        @media (min-width: 429px) {
            body {
                max-width: 428px;
                margin: 0 auto;
                border: 1px solid #e0e0e0;
                box-shadow: 0 0 10px rgba(0,0,0,0.1);
            }
            
            .header {
                font-size: 16px;
                padding: 12px;
            }
            
            .button {
                font-size: 14px;
                padding: 4px 8px;
            }
            
            .subscreen-area {
                font-size: 20px;
            }
            
            .footer {
                font-size: 11px;
                padding: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 标题区 -->
        <div class="header">
            Battery Run Time Calculator <span id="version">v0.0</span>
        </div>
        
        <!-- 按键区 -->
        <div class="button-area">
            <div class="button active">Calc</div>
            <div class="button">DfX</div>
            <div class="button">Settings</div>
        </div>
        
        <!-- 子屏幕区域 -->
        <div class="subscreen-area Calc">
            <div>
                <div id="subscreen-content">Calc 子屏幕</div>
            </div>
        </div>
        
        <!-- 注脚区 -->
        <div class="footer">
            <span id="timestamp"></span> (c) 2026
        </div>
    </div>
    
    <script>
        // 版本号管理
        function manageVersion() {
            let version = localStorage.getItem('app_version');
            
            if (!version) {
                version = '0.0';
            } else {
                // 版本号递增
                const parts = version.split('.');
                const minorVersion = parseInt(parts[1]) + 1;
                version = `${parts[0]}.${minorVersion}`;
            }
            
            localStorage.setItem('app_version', version);
            document.getElementById('version').textContent = `v${version}`;
            return version;
        }
        
        // 时间戳生成和存储
        function generateTimestamp() {
            const version = manageVersion(); // 管理版本号
            let timestamp = localStorage.getItem('app_timestamp');
            
            if (!timestamp) {
                const now = new Date();
                timestamp = now.toISOString().slice(0, 19).replace('T', ' ');
                localStorage.setItem('app_timestamp', timestamp);
            }
            
            document.getElementById('timestamp').textContent = timestamp;
        }
        
        // 调整子屏幕高度
        function adjustSubscreenHeight() {
            const appContainer = document.querySelector('.app-container');
            const header = document.querySelector('.header');
            const buttonArea = document.querySelector('.button-area');
            const footer = document.querySelector('.footer');
            const subscreenArea = document.querySelector('.subscreen-area');
            
            if (appContainer && header && buttonArea && footer && subscreenArea) {
                const totalHeight = appContainer.offsetHeight;
                const headerHeight = header.offsetHeight;
                const buttonAreaHeight = buttonArea.offsetHeight;
                const footerHeight = footer.offsetHeight;
                
                const subscreenHeight = totalHeight - headerHeight - buttonAreaHeight - footerHeight;
                subscreenArea.style.height = `${subscreenHeight}px`;
            }
        }
        
        // 设置按钮监听器
        function setupButtonListeners() {
            const buttons = document.querySelectorAll('.button');
            const subscreenArea = document.querySelector('.subscreen-area');
            const subscreenContent = document.getElementById('subscreen-content');
            
            buttons.forEach(button => {
                button.addEventListener('click', () => {
                    // 移除所有按键的active类
                    buttons.forEach(btn => btn.classList.remove('active'));
                    // 为当前点击的按键添加active类
                    button.classList.add('active');
                    
                    // 移除所有子屏幕类
                    subscreenArea.classList.remove('Calc', 'DfX', 'Settings');
                    // 根据按钮文本添加对应的子屏幕类
                    const buttonText = button.textContent.trim();
                    subscreenArea.classList.add(buttonText);
                    // 更新子屏幕内容
                    subscreenContent.textContent = `${buttonText} 子屏幕`;
                });
            });
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            generateTimestamp();
            adjustSubscreenHeight();
            setupButtonListeners();
        });
        
        // 窗口大小变化时重新调整子屏幕高度
        window.addEventListener('resize', adjustSubscreenHeight);
        
        // Service Worker注册
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => {
                        console.log('Service Worker 注册成功:', registration.scope);
                    })
                    .catch(error => {
                        console.log('Service Worker 注册失败:', error);
                    });
            });
        }
    </script>
</body>
</html>
